name: Generate Daily Blog Posts

on:
  schedule:
    # 매일 오전 9시 UTC (한국 시간 오후 6시)
    - cron: '0 9 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  generate-posts:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # 30분 타임아웃

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Generate daily blog posts
        run: pnpm tsx scripts/generate-daily-posts.ts
        env:
          DATABASE_URL: file:./dev.db
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          POSTS_PER_DAY: '5'
          HOURS_BETWEEN_POSTS: '0'

      - name: Publish posts immediately
        run: |
          echo "🚀 Publishing generated posts..."

          RESPONSE=$(curl -s -L -w "\n%{http_code}" -X POST \
            https://www.colemearchy.com/api/publish-posts \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Code: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Successfully published posts"
          else
            echo "❌ Failed to publish posts (HTTP $HTTP_CODE)"
            exit 1
          fi
